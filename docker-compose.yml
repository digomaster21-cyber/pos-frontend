version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://backend:8000
      - VITE_APP_NAME=Business Dashboard
      - VITE_APP_VERSION=1.0.0
    depends_on:
      - backend
    networks:
      - bizdash-network

  backend:
    image: your-backend-image:latest
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/bizdash
      - SECRET_KEY=your-secret-key
    depends_on:
      - db
    networks:
      - bizdash-network

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=bizdash
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bizdash-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - bizdash-network

networks:
  bizdash-network:
    driver: bridge

volumes:
  postgres_data: